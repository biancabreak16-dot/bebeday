<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background-color: #fff0f3; font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #5d4037; }
        .container { background: white; border-radius: 30px; padding: 2.5rem; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5); text-align: center; border: 3px solid #ffccd5; }
        h1 { font-family: 'Dancing Script', cursive; color: #d62828; font-size: 2rem; margin-bottom: 1rem; }
        .slide { display: none; min-height: 250px; justify-content: center; align-items: center; flex-direction: column; }
        .slide.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn { background: #e63946; color: white; border: none; padding: 0.8rem 2rem; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 10px; font-family: 'Quicksand', sans-serif; transition: 0.2s; }
        .back-btn { background: #ffccd5; color: #d62828; }
        p { font-size: 1.4rem; font-family: 'Dancing Script', cursive; line-height: 1.5; color: #4a4a4a; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<div class="container" id="deck"></div>

<script>
    const slides = [
        "Happy 26th birthday, my love!",
        "Sometimes I envy how the world knew you first before I did. How you spent your first two decades and a half oblivious of a woman in the distant future celebrating your life and sulking at the same time having to spend such special day at work...But enough about me!",
        "It's your 26th birthday, so here are 26 things I loooove about you:",
        "1. Your snaggletooth smile - When you smile big, happy little crescents form in your eyes and the snaggletooth at the front reveals itself!",
        "2. Your big pout - Whether it's a video call or in the flesh, your big pout is a real charmer! I always think about kissing them!",
        "3. Your bedhead - When you just got up and your hair is sticking in every direction with your eyes still trying to get used to light! You're so cutee my baby",
        "4. When you do your little dance routine - The bang, the boogey, and the boobie! Your signature dance! You look so goofy when you do it. I love it!",
        "5. The way you call me 'Bebe' when you're worried - Your tone, your eyes, your body language, everything reaches out to me!",
        "6. The way you call me babe out loud - 'Baby' makes me feel soft. But when you call me 'babe' out loud, somehow I feel like I'm blushing internally hehe.",
        "7. The way you take care of your skin - I love that you take good care of your skin with skin care. I hope you could stick with using lip masks though hehe!",
        "8. The way your hand always looks for me - No matter where we are, your hands always make sure you got me.",
        "9. Speaking of hands - The way you lick the back of my hand sneakily - I don't know how this got here, but I would probably think something is wrong if you did not do this outside in a day.",
        "10. The way you initiate to kiss - When you lean slow, smiling a little. You perfected this love-story move!",
        "11. Talking about kisses - I love when you shower me with smoochy kisses! Even when it gets ticklish!",
        "12. The way you squeeze your eyes when you laugh so hard - You're totally a baby! My baby!",
        "13. The tight hugs before you go - It's always sad when you go. And so the tight hugs get extra necessary.",
        "14. Your big sneaky hands - [Censored]",
        "15. Your little bilins - When I go outside alone, your little bilins make me feel so taken care of. (Just don't go overboard >_<)",
        "16. The way you started taking pictures of our food before we eat on your own - I forget this most of the time now, but you still take time to take pictures or ask me if I would take pictures. You're so thoughtful.",
        "17. The way you take on my challenge when I put vegetables on your plate - You don't have the best reaction everytime, but I love that you take on the challenge anyway!",
        "18. Your smoochy videos - I love when you send me videos kissing the screen hahahahahahahahaha it's really cute and the perspective makes your pout look bigger!",
        "19. The way you care for Katchan - Despite how stingy Katchan is, I love that you always look out for him. You're really his long lost dad!",
        "20. The way we welcome each other with hugs/kisses when we meet before your shifts - It's not a big gesture but it feels so warm and cozy. I can finally put my guard down.",
        "21. How you get competitive when I say 'I love you more' - It's really funny because you're not really competitive when it comes to me but that changes when I say 'I love you more' and 'I miss you more.' I love a little out of character breaks.",
        "22. The way you always want to open the door no matter what - Even when carrying bags with both hands, you always make sure to open the door for me. You make me feel so taken care of. (But let me help for real if you can't hehe.)",
        "23. Your patience with people and things you love - I tell you time and time again that this is something you have inspired me with, and it's still true. I hope our baby gets that from you someday.",
        "24. Your high emotional intelligence - This shows in the way you treat and communicate with everyone. I gotta say I'm proud I got a man like that!",
        "25. The way you're a gentle giant - You're big. () But your gentleness is louder than you are. It shows in your tone, your pace, your words, your movement - I love that despite life, your gentleness endured.",
        "26. Lastly, I love that you are mine! Not in a way that owns you, rather, in the way a song resonates so hard or a quiet sunset belongs to someone. You're a part of my world that brings me comfort, a safe corner where I can genuinely be myself, and a presence that just makes my days better.",
        "Thank God for your life.",
        "I could name more things I love about you. But maybe pag 50th birthday mo na ulit hehe. Spend more birthdays with me, my baby. I love you! ❤️"
    ];

    const deck = document.getElementById('deck');
    slides.forEach((text, i) => {
        const slide = document.createElement('div');
        slide.className = `slide ${i === 0 ? 'active' : ''}`;
        slide.innerHTML = `
            <p>${text}</p>
            <div>
                ${i > 0 ? `<button class="nav-btn back-btn" onclick="nav(-1)">← Back</button>` : ''}
                <button class="nav-btn" onclick="${i === slides.length - 1 ? 'location.reload()' : 'nav(1)'}">${i === slides.length - 1 ? 'Restart 🔄' : 'Next →'}</button>
            </div>
        `;
        deck.appendChild(slide);
    });

    let idx = 0;
    function nav(dir) {
        const els = document.querySelectorAll('.slide');
        els[idx].classList.remove('active');
        idx += dir;
        els[idx].classList.add('active');
        if (dir > 0) confetti({ particleCount: 40, spread: 50, origin: { y: 0.7 }, colors: ['#ffccd5', '#d62828'] });
    }
</script>
</body>
</html>
